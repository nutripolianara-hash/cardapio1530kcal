    const uuids = Object.keys(manifest);

59ab13aa\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"b163f691-7e89-4122-a7fa-b0274f1ea3f6\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n\n<style>\n/* ═══════════════════════════════════════════\n   VARIÁVEIS\n═══════════════════════════════════════════ */\n:root {\n  --vd:  #134F2B;\n  --vm:  #2D8653;\n  --vl:  #E8F5ED;\n  --vs:  #C8E8D4;\n  --txt: #1a1a1a;\n  --t2:  #444;\n  --br:  #FAFCFB;\n  --bo:  #d0e8d8;\n}\n\n* { margin:0; padding:0; box-sizing:border-box; }\n\n/* ═══════════════════════════════════════════\n   PRINT COLOR FORCE — aplicado em TUDO\n═══════════════════════════════════════════ */\n*, *::before, *::after {\n  -webkit-print-color-adjust: exact !important;\n  print-color-adjust: exact !important;\n  color-adjust: exact !important;\n}\n\n/* ═══════════════════════════════════════════\n   BODY / SCREEN\n═══════════════════════════════════════════ */\nbody {\n  background: #0e3d20;\n  font-family: 'DM Sans', sans-serif;\n  color: var(--txt);\n  padding: 32px 20px 48px;\n}\n\n/* toolbar */\n.toolbar {\n  max-width: 800px;\n  margin: 0 auto 16px;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  color: rgba(200,232,212,.65);\n  font-size: 13px;\n}\n.btn-print {\n  background: var(--vm);\n  color: #fff;\n  border: none;\n  padding: 9px 22px;\n  border-radius: 100px;\n  font: 600 13px/1 'DM Sans', sans-serif;\n  cursor: pointer;\n  letter-spacing: .3px;\n}\n.btn-print:hover { background: #39a066; }\n\n/* ═══════════════════════════════════════════\n   FOLHA — largura fixa, sem overflow\n═══════════════════════════════════════════ */\n.sheet {\n  width: 800px;\n  margin: 0 auto;\n  background: var(--vl);\n  box-shadow: 0 28px 90px rgba(0,0,0,.6);\n  border-radius: 6px;\n  overflow: hidden;\n}\n\n/* ═══════════════════════════════════════════\n   CABEÇALHO\n═══════════════════════════════════════════ */\n.hd {\n  background: var(--vd);\n  padding: 26px 44px 20px;\n  position: relative;\n  overflow: hidden;\n}\n.hd::before {\n  content:'';\n  position:absolute; top:-110px; right:-110px;\n  width:380px; height:380px; border-radius:50%;\n  background: radial-gradient(circle, rgba(45,134,83,.3) 0%, transparent 65%);\n}\n.hd::after {\n  content:'';\n  position:absolute; bottom:-50px; left:40px;\n  width:200px; height:200px; border-radius:50%;\n  background: radial-gradient(circle, rgba(45,134,83,.18) 0%, transparent 65%);\n}\n.hd-inner { position:relative; z-index:1; }\n\n.brand-row {\n  display:flex; align-items:center; gap:9px;\n  margin-bottom:10px;\n}\n.brand-em { font-size:22px; line-height:1; }\n.brand-name {\n  font: 600 10px/1 'DM Sans',sans-serif;\n  letter-spacing:3px;\n  text-transform:uppercase;\n  color: rgba(200,232,212,.6);\n}\n\n.hd h1 {\n  font: 700 34px/1.06 'Playfair Display', serif;\n  color: var(--br);\n  margin-bottom:5px;\n}\n.hd h1 em { font-style:italic; color: var(--vs); }\n\n.hd-sub {\n  font: 300 11px/1 'DM Sans',sans-serif;\n  letter-spacing:.7px;\n  color: rgba(232,245,237,.55);\n  margin-bottom:11px;\n}\n\n.badges { display:flex; flex-wrap:wrap; gap:7px; }\n.bdg {\n  display:inline-flex; align-items:center; gap:5px;\n  padding:4px 13px; border-radius:100px;\n  font: 600 11px/1 'DM Sans',sans-serif;\n  letter-spacing:.3px;\n}\n.bdg-solid { background: var(--vm); color:#fff; }\n.bdg-ghost { border:1px solid rgba(200,232,212,.3); color:var(--vs); }\n\n/* ═══════════════════════════════════════════\n   MACRO BAR\n═══════════════════════════════════════════ */\n.macros {\n  background: var(--vm);\n  display:flex; align-items:center;\n  padding:9px 44px;\n}\n.mac { flex:1; text-align:center; color:#fff; }\n.mac .n {\n  font: 700 16px/1 'Playfair Display',serif;\n  display:block;\n}\n.mac .l {\n  font: 500 8.5px/1 'DM Sans',sans-serif;\n  letter-spacing:1.3px;\n  text-transform:uppercase;\n  opacity:.72;\n  display:block;\n  margin-top:3px;\n}\n.mac-sep { width:1px; height:26px; background:rgba(255,255,255,.2); flex-shrink:0; }\n\n.grad { height:3px; background: linear-gradient(90deg, var(--vm), var(--vs) 60%, transparent); }\n\n/* ═══════════════════════════════════════════\n   SECTION HEAD\n═══════════════════════════════════════════ */\n.sh {\n  background: var(--vd);\n  padding:8px 44px;\n  display:flex; align-items:center; gap:10px;\n}\n.sh-emoji { font-size:17px; }\n.sh-time {\n  font: 700 17px/1 'Playfair Display',serif;\n  color: var(--br);\n}\n.sh-label {\n  font: 600 9px/1 'DM Sans',sans-serif;\n  letter-spacing:2px;\n  text-transform:uppercase;\n  color: rgba(200,232,212,.55);\n}\n.sh-kcal {\n  margin-left:auto;\n  background: var(--vm);\n  color:#fff;\n  font: 700 10px/1 'DM Sans',sans-serif;\n  padding:3px 11px; border-radius:100px;\n}\n\n/* ═══════════════════════════════════════════\n   MEAL BODY\n═══════════════════════════════════════════ */\n.mb {\n  background: var(--br);\n  padding:10px 36px 12px;\n  display:flex; flex-direction:column; gap:7px;\n}\n\n/* ═══════════════════════════════════════════\n   OPTION CARD\n═══════════════════════════════════════════ */\n.oc {\n  background:#fff;\n  border:1px solid var(--bo);\n  border-radius:9px;\n  overflow:hidden;\n}\n.ol {\n  padding:5px 13px;\n  font: 600 8.5px/1 'DM Sans',sans-serif;\n  letter-spacing:1.6px;\n  text-transform:uppercase;\n  color:#fff;\n  display:flex; align-items:center; gap:6px;\n}\n.ol-main { background: var(--vm); }\n.ol-1    { background: #1b7040; }\n.ol-2    { background: #185c36; }\n.ol-3    { background: #144a2c; }\n\n.oi { padding:8px 14px 6px; }\n\n.ig {\n  display:grid;\n  grid-template-columns:1fr 1fr;\n  gap:3px 16px;\n}\n.ir {\n  display:flex; align-items:baseline; gap:6px;\n  font: 400 10.5px/1.3 'DM Sans',sans-serif;\n  color: var(--t2);\n}\n.ir::before {\n  content:'';\n  width:4px; height:4px; border-radius:50%;\n  background: var(--vm);\n  flex-shrink:0; margin-top:5px;\n}\n.iq { font-weight:600; color:var(--vd); white-space:nowrap; font-size:10.5px; }\n\n.tip {\n  background: var(--vl);\n  border-top:1px solid var(--bo);\n  padding:5px 13px;\n  font: 300 10px/1.45 'DM Sans',sans-serif;\n  font-style:italic;\n  color:#4a6b55;\n  display:flex; gap:5px;\n}\n.tip::before { content:'✦'; color:var(--vm); flex-shrink:0; }\n\n/* sobremesa chips */\n.chips { display:flex; flex-wrap:wrap; gap:6px; padding:8px 14px 8px; }\n.chip {\n  background: var(--vl);\n  border:1px solid var(--bo);\n  border-radius:100px;\n  padding:4px 13px;\n  font: 500 11px/1 'DM Sans',sans-serif;\n  color:var(--vd);\n}\n\n/* ═══════════════════════════════════════════\n   RODAPÉ\n═══════════════════════════════════════════ */\n.ft {\n  background: var(--vd);\n  padding:13px 44px;\n  display:flex; align-items:center; justify-content:space-between; gap:20px;\n}\n.ft-q {\n  font: 400 italic 12px/1.5 'Playfair Display',serif;\n  color: var(--vs);\n  flex:1;\n}\n.ft-r {\n  text-align:right;\n  font: 300 9.5px/1.7 'DM Sans',sans-serif;\n  color: rgba(200,232,212,.42);\n}\n\n/* ═══════════════════════════════════════════\n   PRINT — contínuo, 7 páginas A4\n═══════════════════════════════════════════ */\n@media print {\n  @page { size: A4 portrait; margin:0; }\n\n  body {\n    background: #0e3d20 !important;\n    padding: 0 !important;\n  }\n\n  .toolbar { display:none !important; }\n\n  .sheet {\n    width:100% !important;\n    border-radius:0 !important;\n    box-shadow:none !important;\n  }\n\n  /* força todas as cores */\n  .hd        { background: var(--vd) !important; }\n  .macros    { background: var(--vm) !important; }\n  .grad      { background: linear-gradient(90deg, var(--vm), var(--vs) 60%, transparent) !important; }\n  .sh        { background: var(--vd) !important; }\n  .mb        { background: var(--br) !important; }\n  .oc        { background: #fff !important; }\n  .ol-main   { background: var(--vm) !important; }\n  .ol-1      { background: #1b7040 !important; }\n  .ol-2      { background: #185c36 !important; }\n  .ol-3      { background: #144a2c !important; }\n  .tip       { background: var(--vl) !important; }\n  .chip      { background: var(--vl) !important; }\n  .ft        { background: var(--vd) !important; }\n  .sh-kcal   { background: var(--vm) !important; }\n  .bdg-solid { background: var(--vm) !important; }\n\n  /* nunca quebrar dentro de cards */\n  .oc  { break-inside: avoid; page-break-inside: avoid; }\n  .sh  { break-inside: avoid; page-break-inside: avoid; }\n  .ft  { break-inside: avoid; page-break-inside: avoid; }\n  .sh + .mb { break-before: avoid; page-break-before: avoid; }\n\n  /*\n     Pág 1 : Capa + Café da Manhã\n     Pág 2 : Colação + Almoço + Sobremesa\n     Pág 3 : Lanche + Jantar\n     Pág 4+ : Ceia + Rodapé (fluxo natural)\n  */\n  .bloco-colacao { break-before: page; page-break-before: always; }\n  .bloco-lanche  { break-before: page; page-break-before: always; }\n  .bloco-ceia    { break-before: page; page-break-before: always; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"toolbar\">\n  <span>✨ Comunidade das Maravilhosas · Cardápio 1530 kcal<\u002Fspan>\n  <button class=\"btn-print\" onclick=\"window.print()\">⬇ Salvar como PDF<\u002Fbutton>\n<\u002Fdiv>\n\n<div class=\"sheet\">\n\n  <!-- ══ CABEÇALHO ══ -->\n  <div class=\"hd\">\n    <div class=\"hd-inner\">\n      <div class=\"brand-row\">\n        <span class=\"brand-em\">✨<\u002Fspan>\n        <span class=\"brand-name\">Comunidade das Maravilhosas<\u002Fspan>\n      <\u002Fdiv>\n      <h1>Cardápio de<br><em>Emagrecimento<\u002Fem><\u002Fh1>\n      <p class=\"hd-sub\">Alimentação equilibrada · Resultados sustentáveis<\u002Fp>\n      <div class=\"badges\">\n        <span class=\"bdg bdg-solid\">🔥 1530 kcal/dia<\u002Fspan>\n        <span class=\"bdg bdg-ghost\">6 Refeições<\u002Fspan>\n        <span class=\"bdg bdg-ghost\">PTN · CHO · LIP balanceados<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ══ MACROS ══ -->\n  <div class=\"macros\">\n    <div class=\"mac\"><span class=\"n\">1530<\u002Fspan><span class=\"l\">Kcal / dia<\u002Fspan><\u002Fdiv>\n    <div class=\"mac-sep\"><\u002Fdiv>\n    <div class=\"mac\"><span class=\"n\">147g<\u002Fspan><span class=\"l\">Proteína 39%<\u002Fspan><\u002Fdiv>\n    <div class=\"mac-sep\"><\u002Fdiv>\n    <div class=\"mac\"><span class=\"n\">159g<\u002Fspan><span class=\"l\">Carboidrato 42%<\u002Fspan><\u002Fdiv>\n    <div class=\"mac-sep\"><\u002Fdiv>\n    <div class=\"mac\"><span class=\"n\">32g<\u002Fspan><span class=\"l\">Gordura 19%<\u002Fspan><\u002Fdiv>\n    <div class=\"mac-sep\"><\u002Fdiv>\n    <div class=\"mac\"><span class=\"n\">6<\u002Fspan><span class=\"l\">Refeições<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"grad\"><\u002Fdiv>\n\n  <!-- ══════════════════════════ 07:00 CAFÉ ══ -->\n  <div class=\"sh bloco-cafe\">\n    <span class=\"sh-emoji\">☀️<\u002Fspan>\n    <span class=\"sh-time\">07:00<\u002Fspan>\n    <span class=\"sh-label\">Café da Manhã<\u002Fspan>\n    <span class=\"sh-kcal\">~360 kcal<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"mb\">\n\n    <div class=\"oc\">\n      <div class=\"ol ol-main\">⭐ Opção Principal — Tapioca Crocante<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">4 col. sopa (15g)<\u002Fspan> Goma para tapioca hidratada<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 unid.<\u002Fspan> Ovo de galinha<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">2 fatias peq. (20g)<\u002Fspan> Queijo Minas Frescal Light<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 col. chá<\u002Fspan> Açafrão<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 dosador (15g)<\u002Fspan> Whey 100% Pure baunilha<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 col. sobremesa<\u002Fspan> Cacau em pó sem adoçante<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 copo (165ml)<\u002Fspan> Água<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tip\">Peneirar a goma, colocar na frigideira, acrescentar metade do queijo ralado e após pegar consistência virar para dourar. Recheio: ovo mexido + outra metade do queijo. Bebida: água + whey baunilha + cacau em pó (Nescau fit).<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"oc\">\n      <div class=\"ol ol-1\">↕ Substituição 1 — Bisnaguito Integral Recheado<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">3 unid.<\u002Fspan> Pão Plus Vita Bisnaguito Integral<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">3 col. sobremesa (7g)<\u002Fspan> Requeijão Light<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">3 fatias peq. (20g)<\u002Fspan> Queijo Minas Frescal Light<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 col. chá<\u002Fspan> Orégano seco<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tip\">Bisnaguito recheado com requeijão temperado com orégano + queijo.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"oc\">\n      <div class=\"ol ol-2\">↕ Substituição 2 — Vitamina de Fruta<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">100 ml<\u002Fspan> Água<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 unid. peq. (50g)<\u002Fspan> Banana congelada<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 unid. (100g)<\u002Fspan> Polpa de morango/acerola/goiaba<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 col. sopa (15g)<\u002Fspan> Pasta de Amendoim Integral<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">2 dosadores (15g)<\u002Fspan> Whey 100% Pure<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tip\">Bater tudo no liquidificador com duas pedras de gelo.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"oc\">\n      <div class=\"ol ol-3\">↕ Substituição 3 — Tortilha Wrap<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">4 col. sopa (18g)<\u002Fspan> Filé de frango cozido ou patinho<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 unid.<\u002Fspan> Tortilla Wraps<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">2 col. sopa (15g)<\u002Fspan> Requeijão Light<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 fatia gde (30g)<\u002Fspan> Queijo Minas Frescal Light<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tip\">Tortilha + frango ou carne com requeijão e queijo, temperos naturais de recheio.<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ══════════════════════════ 09:30 COLAÇÃO ══ -->\n  <div class=\"sh bloco-colacao\">\n    <span class=\"sh-emoji\">🍎<\u002Fspan>\n    <span class=\"sh-time\">09:30<\u002Fspan>\n    <span class=\"sh-label\">Colação<\u002Fspan>\n    <span class=\"sh-kcal\">~150 kcal<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"mb\">\n\n    <div class=\"oc\">\n      <div class=\"ol ol-main\">⭐ Opção Principal — Iogurte com Aveia<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">1 pote (160g)<\u002Fspan> Iogurte Yopro 15g Danone<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 col. sopa (10g)<\u002Fspan> Farelo de Aveia Jasmine<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"oc\">\n      <div class=\"ol ol-1\">↕ Substituição 1 — Bebida Láctea Proteica<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">1 caixinha (200ml)<\u002Fspan> Itambém Pró+ 22g Chocolate<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"oc\">\n      <div class=\"ol ol-2\">↕ Substituição 2 — Mousse de Maracujá<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">1 pote (170g)<\u002Fspan> Iogurte Itambém Desnatado Zero Lactose<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 col. sopa (11,5g)<\u002Fspan> Leite desnatado em pó<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 unid. média (45g)<\u002Fspan> Maracujá<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tip\">Mousse de Maracujá: iogurte + whey maracujá puro.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"oc\">\n      <div class=\"ol ol-3\">↕ Substituição 3 — Cookies Fit<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">1 pacote (45g)<\u002Fspan> Cookies Fit Wheyviv<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ══════════════════════════ 12:00 ALMOÇO ══ -->\n  <div class=\"sh bloco-almoco\">\n    <span class=\"sh-emoji\">🥗<\u002Fspan>\n    <span class=\"sh-time\">12:00<\u002Fspan>\n    <span class=\"sh-label\">Almoço<\u002Fspan>\n    <span class=\"sh-kcal\">~520 kcal<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"mb\">\n\n    <div class=\"oc\">\n      <div class=\"ol ol-main\">⭐ Opção Principal — Frango com Arroz e Feijão<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">à vontade<\u002Fspan> Salada ou verdura crua<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">130g<\u002Fspan> Filé de frango cozido ou 120g patinho<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">4 col. sopa cheias<\u002Fspan> Arroz integral/branco ou 5 fatias batata inglesa<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 concha (70g)<\u002Fspan> Feijão cozido ou legumes no vapor<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tip\">Filé de frango: 3 filés médios ou 2 grandes / Carne: 2 bifes ou 4 colheres de sopa de carne moída.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"oc\">\n      <div class=\"ol ol-1\">↕ Substituição 1 — Macarronada Fit<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">6 garfadas (20g)<\u002Fspan> Macarrão integral cozido<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">4 col. sopa (20g)<\u002Fspan> Patinho / frango / atum / sardinha<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 fatia peq. (20g)<\u002Fspan> Queijo Minas Frescal Light<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">2 col. sopa (20g)<\u002Fspan> Extrato de tomate Arisco<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tip\">Macarrão integral + patinho moído + queijo ralado + molho de tomate.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"oc\">\n      <div class=\"ol ol-2\">↕ Substituição 2 — Escondidinho de Jerimum<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">7 col. sopa (20g)<\u002Fspan> Jerimum cozido ou 4 fatias batata inglesa<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">5 col. sopa (20g)<\u002Fspan> Filé de frango ou patinho cozido<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 col. sopa (30g)<\u002Fspan> Requeijão Light<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">2 fatias gdes (30g)<\u002Fspan> Queijo Minas Frescal Light<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tip\">Amasse o jerimum, misture o requeijão, coloque em refratário com frango/carne e queijo ralado. Gratinar na Airfryer ou microondas.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"oc\">\n      <div class=\"ol ol-3\">↕ Substituição 3 — Frango ou Peixe Empanado<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">2 filés<\u002Fspan> Frango cozido ou 1,5 filé (150g) peixe<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">6 fatias (30g)<\u002Fspan> Batata inglesa ou 5 col. arroz integral<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">2 col. sopa (10g)<\u002Fspan> Farelo de Aveia Jasmine<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 col. sopa (11g)<\u002Fspan> Queijo parmesão ralado<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tip\">Temperar o frango ou peixe na aveia/parmesão e colocar na Airfryer por 20 min a 180°C. Servir com batata inglesa.<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ══════════════════════════ 12:40 SOBREMESA ══ -->\n  <div class=\"sh bloco-almoco2\">\n    <span class=\"sh-emoji\">🍊<\u002Fspan>\n    <span class=\"sh-time\">12:40<\u002Fspan>\n    <span class=\"sh-label\">Sobremesa do Almoço<\u002Fspan>\n    <span class=\"sh-kcal\">~60 kcal<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"mb\">\n    <div class=\"oc\">\n      <div class=\"ol ol-main\">⭐ Escolha uma opção<\u002Fdiv>\n      <div class=\"chips\">\n        <span class=\"chip\">🍊 Tangerina pequena<\u002Fspan>\n        <span class=\"chip\">🍇 Uva 60g<\u002Fspan>\n        <span class=\"chip\">🍋 Laranja pequena 90g<\u002Fspan>\n        <span class=\"chip\">🍫 Sonho de Valsa (1 unid.)<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ══════════════════════════ 16:00 LANCHE ══ -->\n  <div class=\"sh bloco-lanche\">\n    <span class=\"sh-emoji\">🍵<\u002Fspan>\n    <span class=\"sh-time\">16:00<\u002Fspan>\n    <span class=\"sh-label\">Lanche da Tarde<\u002Fspan>\n    <span class=\"sh-kcal\">~270 kcal<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"mb\">\n\n    <div class=\"oc\">\n      <div class=\"ol ol-main\">⭐ Opção Principal — Pão com Patê de Frango<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">2 fatias (25g)<\u002Fspan> Pão 100% Integral Plus Vita Pullman<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 col. sopa (15g)<\u002Fspan> Requeijão Light<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">3 col. sopa (18g)<\u002Fspan> Frango cozido ou patinho ou atum<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 unid. peq.<\u002Fspan> Banana, tangerina ou laranja<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tip\">Pão recheado com patê de frango ou atum (frango desfiado + creme de ricota + orégano, refogar na frigideira). Fruta de sobremesa.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"oc\">\n      <div class=\"ol ol-1\">↕ Substituição 1 — Bebida Proteica com Castanha<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">1 caixinha (200ml)<\u002Fspan> Itambém Pró+ 22g Chocolate<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 unid. peq. (42g)<\u002Fspan> Banana<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">8 unid. (2,5g)<\u002Fspan> Castanha de caju torrada sem sal<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"oc\">\n      <div class=\"ol ol-2\">↕ Substituição 2 — Cuscuz Refogado<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">5 col. sopa (15g)<\u002Fspan> Cuscuz<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 col. sopa (15g)<\u002Fspan> Requeijão Light<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">3 fatias peq. (20g)<\u002Fspan> Queijo Minas Frescal Light<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tip\">Cuscuz refogado com requeijão e queijo.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"oc\">\n      <div class=\"ol ol-3\">↕ Substituição 3 — Panqueca de Banana<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">1 unid. peq. (42g)<\u002Fspan> Banana<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 unid.<\u002Fspan> Ovo de galinha<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 col. sopa (10g)<\u002Fspan> Farelo de Aveia Jasmine<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 col. sobremesa<\u002Fspan> Canela em pó<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 col. sobremesa (7,5g)<\u002Fspan> Pasta de Amendoim Integral<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">2 quadradinhos<\u002Fspan> Chocolate LACTA Intense 60%<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">2 unid.<\u002Fspan> Ameixa<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tip\">Amassar a banana, misturar com os demais ingredientes e levar ao microondas.<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ══════════════════════════ 20:00 JANTAR ══ -->\n  <div class=\"sh bloco-jantar\">\n    <span class=\"sh-emoji\">🌙<\u002Fspan>\n    <span class=\"sh-time\">20:00<\u002Fspan>\n    <span class=\"sh-label\">Jantar<\u002Fspan>\n    <span class=\"sh-kcal\">~310 kcal<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"mb\">\n\n    <div class=\"oc\">\n      <div class=\"ol ol-main\">⭐ Opção Principal — Arroz Refogado com Frango<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">à vontade<\u002Fspan> Salada ou verdura crua<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">5 col. sopa (18g)<\u002Fspan> Frango cozido ou 3 col. patinho<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">4 col. sopa cheias<\u002Fspan> Arroz integral ou 5 fatias batata inglesa<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 col. sopa (15g)<\u002Fspan> Requeijão Light<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 col. café<\u002Fspan> Orégano seco<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tip\">Refogar tudo: arroz integral ou batata inglesa com requeijão + orégano com frango desfiado ou carne moída.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"oc\">\n      <div class=\"ol ol-1\">↕ Substituição 1 — Omelete de Atum<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">1 unid.<\u002Fspan> Ovo de galinha<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">2 col. sopa (20g)<\u002Fspan> Atum ou 3 col. frango cozido<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">3 col. sopa cheias<\u002Fspan> Arroz integral cozido<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tip\">Bater os ovos com garfo, acrescentar o atum ou frango e dourar na frigideira. Frigideira pode ser untada com manteiga ghee ou azeite.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"oc\">\n      <div class=\"ol ol-2\">↕ Substituição 2 — Hambúrguer Fit<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">2 fatias (25g)<\u002Fspan> Pão 100% Integral Plus Vita<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">5 col. sopa (20g)<\u002Fspan> Patinho moído<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">2 col. sopa (20g)<\u002Fspan> Molho de tomate<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">2 fatias peq. (20g)<\u002Fspan> Queijo Minas Frescal Light<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 col. sopa (10g)<\u002Fspan> Cebola picada<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tip\">Assar o patinho na frigideira com alho e temperos. Ralar o queijo, misturar com molho e montar o hambúrguer. Finalizar com cebola refogada por cima.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"oc\">\n      <div class=\"ol ol-3\">↕ Substituição 3 — Pizza Fit<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">1 unid. (40g)<\u002Fspan> Rap 10 Integral<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">3 col. sopa (18g)<\u002Fspan> Frango cozido ou 2 col. patinho<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">2 col. sopa (20g)<\u002Fspan> Molho de tomate<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 fatia peq. (20g)<\u002Fspan> Queijo Minas Frescal Light<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tip\">Esquentar a massa na frigideira, colocar o molho, frango/carne, ralar o queijo por cima. Pode usar orégano e tomate.<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ══════════════════════════ 22:00 CEIA ══ -->\n  <div class=\"sh bloco-ceia\">\n    <span class=\"sh-emoji\">🌛<\u002Fspan>\n    <span class=\"sh-time\">22:00<\u002Fspan>\n    <span class=\"sh-label\">Ceia<\u002Fspan>\n    <span class=\"sh-kcal\">~120 kcal<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"mb\">\n\n    <div class=\"oc\">\n      <div class=\"ol ol-main\">⭐ Opção Principal — Vitamina de Polpa<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">1 dosador (15g)<\u002Fspan> Whey 100% Pure Integralmedica<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 unid. (100g)<\u002Fspan> Polpa de acerola/morango/goiaba<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">150 ml<\u002Fspan> Água<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"oc\">\n      <div class=\"ol ol-1\">↕ Substituição 1 — Iogurte com Castanha<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">300 ml<\u002Fspan> Iogurte Belle Light Morango Betânia<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">7 unid. (2,5g)<\u002Fspan> Castanha de caju torrada sem sal<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"oc\">\n      <div class=\"ol ol-2\">↕ Substituição 2 — Coxinha Sucrê com Patê de Queijo<\u002Fdiv>\n      <div class=\"oi\">\n        <div class=\"ig\">\n          <div class=\"ir\"><span class=\"iq\">4 unid. (13g)<\u002Fspan> Mini Coxinha Sucrê<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">10g<\u002Fspan> Queijo Minas Frescal Light<\u002Fdiv>\n          <div class=\"ir\"><span class=\"iq\">1 col. sopa (15g)<\u002Fspan> Requeijão Light<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"tip\">Coxinha sucrê com patê de queijo (queijo ralado + requeijão + temperos naturais).<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- ══ RODAPÉ ══ -->\n  <div class=\"ft\">\n    <div class=\"ft-q\">\"Cuide do seu corpo — é o único lugar onde você vive.\" ✨<\u002Fdiv>\n    <div class=\"ft-r\">\n      ✨ Comunidade das Maravilhosas<br>\n      Cardápio Emagrecimento · 1530 kcal/dia<br>\n      Documento de uso exclusivo do destinatário\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv><!-- /sheet -->\n\n\n\n<\u002Fbody><\u002Fhtml>"
